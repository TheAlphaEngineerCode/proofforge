# ProofForge — local development infrastructure.
# Brings up PostgreSQL (metadata), Redis (queue/event bus) and MinIO (object storage).
# Usage: make docker-up   /   make docker-down

services:
  postgres:
    image: postgres:16-alpine
    container_name: proofforge-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: proofforge
      POSTGRES_PASSWORD: proofforge
      POSTGRES_DB: proofforge
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U proofforge -d proofforge"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: proofforge-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    container_name: proofforge-minio
    restart: unless-stopped
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: proofforge
      MINIO_ROOT_PASSWORD: proofforge-secret
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10

  # One-shot job that creates the evidence bucket on first boot.
  minio-setup:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 proofforge proofforge-secret &&
      mc mb --ignore-existing local/proofforge-evidence &&
      echo 'Bucket proofforge-evidence ready';
      "

volumes:
  postgres-data:
  redis-data:
  minio-data:
