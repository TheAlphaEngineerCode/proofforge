version: 2
updates:
  # JavaScript / TypeScript dependencies.
  # Minor and patch updates are grouped into two PRs (prod + dev) per week.
  # Major bumps are ignored here to avoid breaking-change noise — bump them
  # deliberately when ready. Dependabot *security* updates are unaffected and
  # still open PRs for vulnerable dependencies.
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(deps)"
    groups:
      production-minor-patch:
        dependency-type: production
        update-types: [minor, patch]
      development-minor-patch:
        dependency-type: development
        update-types: [minor, patch]
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  # GitHub Actions — everything grouped into a single weekly PR.
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 3
    commit-message:
      prefix: "chore(ci)"
    groups:
      github-actions:
        patterns: ["*"]
